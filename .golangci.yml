# .golangci.yml — golangci-lint v2 config.
# FinTech codebase: a silently swallowed error is a money-losing bug, not a stylistic choice.

version: "2"

run:
  timeout: 5m
  build-tags:
    - integration

linters:
  default: none
  enable:
    # Core correctness
    - govet              # everything `go vet` runs, plus more
    - staticcheck        # SA*, S*, ST* — the gold standard for Go static analysis
    - errcheck           # unchecked errors — load-bearing in FinTech
    - ineffassign        # ineffectual assignments
    - unused             # dead code

    # Concurrency / resource hygiene
    - bodyclose          # response.Body must be Closed
    - rowserrcheck       # sql.Rows.Err() must be checked
    - sqlclosecheck      # sql.Rows / sql.Stmt must be Closed

    # Security
    - gosec              # G-rule security advisories
    - bidichk            # bidi rune injection (CVE-2021-42574)

    # Hygiene
    - misspell           # common typos in comments and strings
    - unconvert          # unnecessary type conversions
    - unparam            # unused function parameters (signals dead code paths)
    - nilerr             # returning nil after testing err != nil
    - errorlint          # %w usage; switch on errors.Is/As

  settings:
    gosec:
      excludes:
        # G115: integer overflow in int conversions. False positives across int<->int64.
        # money.Kobo has explicit overflow checks where it actually matters.
        - G115
    errcheck:
      # Bloom Add is advisory (best-effort); Redis Del during idempotency cleanup
      # is fire-and-forget — both intentionally not error-checked.
      exclude-functions:
        - (*go-payroll-engine/internal/api/middleware.BloomFilter).Add
        - (github.com/redis/go-redis/v9.Client).Del

  exclusions:
    rules:
      # Test files defer body.Close() and the like — readability beats strict checking.
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
